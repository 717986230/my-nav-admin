<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uuoo.site - 我的导航</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* 搜索框 */
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 15px 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-icon {
            font-size: 24px;
            margin-right: 15px;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            background: transparent;
        }

        /* 分类区域 */
        .category-section {
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .category-icon {
            font-size: 32px;
            margin-right: 15px;
        }

        .category-title {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        /* 链接网格 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .link-icon {
            font-size: 40px;
            margin-right: 15px;
            width: 50px;
            text-align: center;
        }

        .link-info {
            flex: 1;
        }

        .link-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .link-desc {
            font-size: 14px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 40px;
            padding: 20px;
        }

        .footer a {
            color: white;
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            .link-card {
                padding: 15px;
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- 头部 -->
            <header class="header">
                <div class="logo">🧭</div>
                <h1 class="title">{{ siteName }}</h1>
                <p class="subtitle">{{ siteDescription }}</p>
            </header>

            <!-- 搜索框 -->
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input
                    v-model="searchQuery"
                    class="search-input"
                    placeholder="搜索链接..."
                    @input="handleSearch"
                >
            </div>

            <!-- 加载状态 -->
            <div v-if="loading" class="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px;">加载中...</p>
            </div>

            <!-- 链接列表 -->
            <div v-else-if="filteredCategories.length > 0">
                <div
                    v-for="category in filteredCategories"
                    :key="category.id"
                    class="category-section"
                >
                    <div class="category-header">
                        <span class="category-icon">{{ category.icon }}</span>
                        <h2 class="category-title">{{ category.name }}</h2>
                    </div>
                    <div class="links-grid">
                        <a
                            v-for="link in getLinksByCategory(category.name)"
                            :key="link.id"
                            :href="link.url"
                            class="link-card"
                            target="_blank"
                            @click="handleClick(link)"
                        >
                            <span class="link-icon">{{ link.icon }}</span>
                            <div class="link-info">
                                <div class="link-title">{{ link.title }}</div>
                                <div class="link-desc">{{ link.description || link.url }}</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div v-else class="empty-state">
                <div style="font-size: 64px; margin-bottom: 20px;">🔍</div>
                <p>没有找到匹配的链接</p>
            </div>

            <!-- 页脚 -->
            <footer class="footer">
                <p>Made with ❤️ by <a href="https://uuoo.site" target="_blank">uuoo.site</a></p>
                <p style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                    总共 {{ links.length }} 个链接 · 今日访问 {{ totalClicks }} 次
                </p>
            </footer>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const siteName = ref('uuoo.site 导航');
                const siteDescription = ref('一键直达常用网站');
                const searchQuery = ref('');
                const links = ref([]);
                const categories = ref([]);
                const loading = ref(true);
                const totalClicks = ref(0);

                // 过滤后的链接
                const filteredLinks = computed(() => {
                    if (!searchQuery.value) return links.value;

                    const query = searchQuery.value.toLowerCase();
                    return links.value.filter(link =>
                        link.title.toLowerCase().includes(query) ||
                        (link.description && link.description.toLowerCase().includes(query)) ||
                        link.url.toLowerCase().includes(query)
                    );
                });

                // 过滤后的分类
                const filteredCategories = computed(() => {
                    if (!searchQuery.value) return categories.value;

                    const categoryNames = new Set(
                        filteredLinks.value.map(link => link.category)
                    );
                    return categories.value.filter(cat => categoryNames.has(cat.name));
                });

                // 根据分类获取链接
                const getLinksByCategory = (categoryName) => {
                    return filteredLinks.value.filter(link => link.category === categoryName);
                };

                // 处理搜索
                const handleSearch = () => {
                    console.log('搜索:', searchQuery.value);
                };

                // 处理点击
                const handleClick = async (link) => {
                    try {
                        // 记录点击
                        await fetch(`https://api.uuoo.site/api/links/${link.id}/click`, {
                            method: 'POST'
                        });
                        totalClicks.value++;
                    } catch (error) {
                        console.error('记录点击失败:', error);
                    }
                };

                // 加载数据
                const loadData = async () => {
                    try {
                        // 并行加载链接和分类
                        const [linksRes, categoriesRes, statsRes] = await Promise.all([
                            fetch('https://api.uuoo.site/api/links'),
                            fetch('https://api.uuoo.site/api/categories'),
                            fetch('https://api.uuoo.site/api/stats')
                        ]);

                        const linksData = await linksRes.json();
                        const categoriesData = await categoriesRes.json();
                        const statsData = await statsRes.json();

                        if (linksData.success) {
                            links.value = linksData.data;
                        }

                        if (categoriesData.success) {
                            categories.value = categoriesData.data;
                        }

                        if (statsData.success) {
                            totalClicks.value = statsData.data.totalClicks;
                        }

                        loading.value = false;
                    } catch (error) {
                        console.error('加载数据失败:', error);
                        loading.value = false;

                        // 使用默认数据
                        links.value = [
                            { id: '1', title: 'GitHub', url: 'https://github.com', icon: '🐙', category: '开发工具', description: '全球最大的代码托管平台' },
                            { id: '2', title: 'Stack Overflow', url: 'https://stackoverflow.com', icon: '📚', category: '开发工具', description: '程序员的问答社区' },
                            { id: '3', title: 'Google', url: 'https://google.com', icon: '🌐', category: '搜索引擎', description: '全球最大的搜索引擎' },
                            { id: '4', title: 'Bing', url: 'https://bing.com', icon: '🔍', category: '搜索引擎', description: '微软搜索引擎' },
                            { id: '5', title: 'Twitter', url: 'https://twitter.com', icon: '🐦', category: '社交媒体', description: '全球社交网络' },
                            { id: '6', title: '微博', url: 'https://weibo.com', icon: '💬', category: '社交媒体', description: '中国社交平台' }
                        ];

                        categories.value = [
                            { id: '1', name: '开发工具', icon: '🔧' },
                            { id: '2', name: '搜索引擎', icon: '🔍' },
                            { id: '3', name: '社交媒体', icon: '📱' }
                        ];
                    }
                };

                onMounted(() => {
                    loadData();
                });

                return {
                    siteName,
                    siteDescription,
                    searchQuery,
                    links,
                    categories,
                    loading,
                    totalClicks,
                    filteredLinks,
                    filteredCategories,
                    getLinksByCategory,
                    handleSearch,
                    handleClick
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
